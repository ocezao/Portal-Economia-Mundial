# Cenario Internacional - Nginx Configuration
# Portal Economico Mundial
# Dominio: cenariointernacional.com.br
#
# Instalar:
#   sudo cp nginx/pem.conf /etc/nginx/sites-available/pem
#   sudo ln -s /etc/nginx/sites-available/pem /etc/nginx/sites-enabled/pem
#   sudo nginx -t && sudo systemctl reload nginx

# Upstream para Next.js
upstream nextjs_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=global_limit:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name cenariointernacional.com.br www.cenariointernacional.com.br;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cenariointernacional.com.br www.cenariointernacional.com.br;

    # SSL Configuration
    include /etc/nginx/ssl.conf;

    # Root directory (for static files fallback)
    root /var/www/pem/public;

    # Logging
    access_log /var/log/nginx/pem-access.log combined;
    error_log /var/log/nginx/pem-error.log warn;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.onesignal.com https://api.onesignal.com https://www.googletagmanager.com https://www.google-analytics.com https://pagead2.googlesyndication.com https://www.googleadservices.com https://partner.googleadservices.com https://www.clarity.ms; script-src-elem 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.onesignal.com https://api.onesignal.com https://www.googletagmanager.com https://www.google-analytics.com https://pagead2.googlesyndication.com https://www.googleadservices.com https://partner.googleadservices.com https://www.clarity.ms; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https://*.finnhub.io https://api.buttondown.email https://onesignal.com https://*.onesignal.com https://api.onesignal.com https://www.google-analytics.com https://region1.google-analytics.com https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net https://www.googleadservices.com https://www.clarity.ms https://c.clarity.ms; font-src 'self' data:; object-src 'none'; frame-src 'self' https://googleads.g.doubleclick.net https://tpc.googlesyndication.com https://www.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Brotli Compression (if installed)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml;

    # Connection limits
    limit_conn conn_limit 20;

    # Next.js static files (cached aggressively)
    location /_next/static/ {
        proxy_cache_valid 200 365d;
        proxy_cache static_cache;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_pass http://nextjs_backend;
    }

    # Images cache
    location ~* \.(jpg|jpeg|png|gif|webp|avif|ico|svg)$ {
        proxy_cache_valid 200 30d;
        proxy_cache static_cache;
        add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400";
        proxy_pass http://nextjs_backend;
        expires 30d;
    }

    # Fonts cache
    location ~* \.(woff|woff2|ttf|otf|eot)$ {
        proxy_cache_valid 200 365d;
        proxy_cache static_cache;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_pass http://nextjs_backend;
        expires 1y;
    }

    # API Rate Limiting
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_pass http://nextjs_backend;
    }

    # Upload endpoint (stricter rate limit)
    location /api/upload {
        limit_req zone=api_limit burst=5 nodelay;
        client_max_body_size 10M;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        
        proxy_pass http://nextjs_backend;
    }

    # Health check (no rate limit)
    location /api/health {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        proxy_pass http://nextjs_backend;
        access_log off;
    }

    # RSS and Sitemap (cached)
    location ~ ^/(rss\.xml|sitemap\.xml|sitemaps/) {
        proxy_cache_valid 200 1h;
        proxy_cache static_cache;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=300";
        proxy_pass http://nextjs_backend;
    }

    # All other requests to Next.js
    location / {
        limit_req zone=global_limit burst=50 nodelay;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_pass http://nextjs_backend;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~* \.(env|git|gitignore|dockerignore|md)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
