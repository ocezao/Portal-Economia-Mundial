server {
    listen 80;
    listen [::]:80;
    server_name www.cenariointernacional.com.br;
    return 301 https://cenariointernacional.com.br$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name cenariointernacional.com.br api.cenariointernacional.com.br metabase.cenariointernacional.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.cenariointernacional.com.br;

    ssl_certificate /etc/letsencrypt/live/cenariointernacional.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cenariointernacional.com.br/privkey.pem;

    return 301 https://cenariointernacional.com.br$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cenariointernacional.com.br;

    ssl_certificate /etc/letsencrypt/live/cenariointernacional.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cenariointernacional.com.br/privkey.pem;

    # OTIMIZAÇÃO: Cache agressivo para conteúdo estático
    open_file_cache max=1000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # OTIMIZAÇÃO: Conexões keep-alive
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    location / {
        client_max_body_size 10M;
        proxy_buffering off;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # OTIMIZAÇÃO: Cache headers para conteúdo dinâmico
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        
        # Add Cache-Control header for Next.js pages
        add_header X-Cache-Status $upstream_cache_status;
    }

    # OTIMIZAÇÃO: Cache específico para arquivos estáticos do Next.js
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 60m;
        proxy_cache_use_stale error timeout invalid_header updating;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Cache-Status HIT;
    }

    # OTIMIZAÇÃO: Cache para imagens
    location /images/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400";
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.cenariointernacional.com.br;

    ssl_certificate /etc/letsencrypt/live/api.cenariointernacional.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.cenariointernacional.com.br/privkey.pem;

    location = /mcp/vps-admin {
        proxy_pass http://127.0.0.1:18100/mcp/vps-admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name metabase.cenariointernacional.com.br;

    ssl_certificate /etc/letsencrypt/live/metabase.cenariointernacional.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/metabase.cenariointernacional.com.br/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
