# Exemplo de configuracao local

[servers]
name = "portal-local"
command = "node"
args = ["/var/www/cenario-internacional/collector/dist/server.js"]

[servers.env]
DATABASE_URL = "postgresql://usuario:senha@localhost:5432/portal"
NEXT_PUBLIC_FINNHUB_API_KEY = "sua-chave-finnhub"
NEXT_PUBLIC_SITE_URL = "https://cenariointernacional.com.br"
AUTH_SESSION_SECRET = "segredo-da-sessao"
UPLOADS_DIR = "/var/www/cenariointernacional/public/uploads"
