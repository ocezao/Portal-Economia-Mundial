version: '3.8'

services:
  # Banco de Dados PostgreSQL Local
  database:
    image: postgres:15-alpine
    container_name: portal-database
    environment:
      POSTGRES_DB: ${DB_NAME:-portal}
      POSTGRES_USER: ${DB_USER:-portal_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-portal_user} -d ${DB_NAME:-portal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_FINNHUB_API_KEY: ${NEXT_PUBLIC_FINNHUB_API_KEY}
        NEXT_PUBLIC_ONESIGNAL_APP_ID: ${NEXT_PUBLIC_ONESIGNAL_APP_ID}
        NEXT_PUBLIC_ADSENSE_CLIENT_ID: ${NEXT_PUBLIC_ADSENSE_CLIENT_ID}
        NEXT_PUBLIC_ADSENSE_SLOT_INARTICLE: ${NEXT_PUBLIC_ADSENSE_SLOT_INARTICLE}
    container_name: portal-web
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
      - GNEWS_API_KEY=${GNEWS_API_KEY}
      - NEXT_PUBLIC_FINNHUB_API_KEY=${NEXT_PUBLIC_FINNHUB_API_KEY}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - NEXT_PUBLIC_ONESIGNAL_APP_ID=${NEXT_PUBLIC_ONESIGNAL_APP_ID}
      - ONESIGNAL_REST_API_KEY=${ONESIGNAL_REST_API_KEY}
      - NEXT_PUBLIC_ADSENSE_CLIENT_ID=${NEXT_PUBLIC_ADSENSE_CLIENT_ID}
      - NEXT_PUBLIC_ADSENSE_SLOT_INARTICLE=${NEXT_PUBLIC_ADSENSE_SLOT_INARTICLE}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - DATABASE_URL=postgresql://${DB_USER:-portal_user}:${DB_PASSWORD}@database:5432/${DB_NAME:-portal}
      - CRON_API_SECRET=${CRON_API_SECRET}
    ports:
      - '3000:3000'
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_FINNHUB_API_KEY: ${NEXT_PUBLIC_FINNHUB_API_KEY}
        NEXT_PUBLIC_ONESIGNAL_APP_ID: ${NEXT_PUBLIC_ONESIGNAL_APP_ID}
        NEXT_PUBLIC_ADSENSE_CLIENT_ID: ${NEXT_PUBLIC_ADSENSE_CLIENT_ID}
        NEXT_PUBLIC_ADSENSE_SLOT_INARTICLE: ${NEXT_PUBLIC_ADSENSE_SLOT_INARTICLE}
    container_name: portal-api
    environment:
      - NODE_ENV=production
      - PORT=4000
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
      - GNEWS_API_KEY=${GNEWS_API_KEY}
      - NEXT_PUBLIC_FINNHUB_API_KEY=${NEXT_PUBLIC_FINNHUB_API_KEY}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - NEXT_PUBLIC_ONESIGNAL_APP_ID=${NEXT_PUBLIC_ONESIGNAL_APP_ID}
      - ONESIGNAL_REST_API_KEY=${ONESIGNAL_REST_API_KEY}
      - NEXT_PUBLIC_ADSENSE_CLIENT_ID=${NEXT_PUBLIC_ADSENSE_CLIENT_ID}
      - NEXT_PUBLIC_ADSENSE_SLOT_INARTICLE=${NEXT_PUBLIC_ADSENSE_SLOT_INARTICLE}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - DATABASE_URL=postgresql://${DB_USER:-portal_user}:${DB_PASSWORD}@database:5432/${DB_NAME:-portal}
      - CRON_API_SECRET=${CRON_API_SECRET}
    ports:
      - '4000:4000'
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:4000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  collector:
    build:
      context: ./collector
      dockerfile: Dockerfile
    container_name: portal-collector
    environment:
      - NODE_ENV=production
      - PORT=4010
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - LOG_LEVEL=info
      - DATABASE_URL=postgresql://${DB_USER:-portal_user}:${DB_PASSWORD}@database:5432/${DB_NAME:-portal}
    ports:
      - '4010:4010'
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:4010/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  metabase:
    image: metabase/metabase:latest
    container_name: portal-metabase
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=${DB_NAME:-portal}
      - MB_DB_PORT=5432
      - MB_DB_USER=${DB_USER:-portal_user}
      - MB_DB_PASS=${DB_PASSWORD}
      - MB_DB_HOST=database
    ports:
      - '3001:3000'
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy

volumes:
  postgres_data:
