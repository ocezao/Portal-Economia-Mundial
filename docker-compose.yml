version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cin_analytics
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_123}
    volumes:
      - cin_cin_postgres_data:/var/lib/postgresql/data
      - ./collector/src/db/migrations:/docker-entrypoint-initdb.d
      - ./scripts:/scripts
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics -d pem_analytics"]
      interval: 5s
      timeout: 5s
      retries: 5

  init-partitions:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: pem_analytics
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_123}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      PGHOST: postgres
      PGPORT: 5432
    volumes:
      - ./scripts:/scripts
    working_dir: /scripts
    command: >
      sh -c "
        echo 'Aguardando PostgreSQL...' &&
        sleep 2 &&
        echo 'Criando partições...' &&
        ./partition-manager.sh 3 &&
        echo 'Partições criadas com sucesso!'
      "
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  collector:
    build: ./collector
    environment:
      - PORT=3000
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=pem_analytics
      - POSTGRES_USER=analytics
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-dev_password_123}
      - LOG_LEVEL=info
    ports:
      - "3000:3000"
    depends_on:
      init-partitions:
        condition: service_completed_successfully
    volumes:
      - ./scripts:/scripts

  metabase:
    image: metabase/metabase:latest
    ports:
      - "3001:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: pem_analytics
      MB_DB_PORT: 5432
      MB_DB_USER: analytics
      MB_DB_PASS: ${POSTGRES_PASSWORD:-dev_password_123}
      MB_DB_HOST: postgres
    depends_on:
      - postgres

volumes:
  postgres_data:
