server {
    listen 80;
    listen [::]:80;
    server_name cenariointernacional.com.br www.cenariointernacional.com.br api.cenariointernacional.com.br metabase.cenariointernacional.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.cenariointernacional.com.br;

    ssl_certificate /etc/letsencrypt/live/cenariointernacional.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cenariointernacional.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://cenariointernacional.com.br$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cenariointernacional.com.br;

    ssl_certificate /etc/letsencrypt/live/cenariointernacional.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cenariointernacional.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.cenariointernacional.com.br;

    ssl_certificate /etc/letsencrypt/live/api.cenariointernacional.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.cenariointernacional.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name metabase.cenariointernacional.com.br;

    ssl_certificate /etc/letsencrypt/live/metabase.cenariointernacional.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/metabase.cenariointernacional.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

